version: '3.8'

networks:
  frontend:
    driver: bridge
    # Rede pública – acessível externamente
  backend:
    driver: bridge
    internal: true   # Rede privada – só containers conectados a ela

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend   # Apenas na rede privada
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    build: app
    ports:
      - "8080:5000"
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      SECRET_KEY: ${SECRET_KEY}
    networks:
      - frontend   # Para acesso do host
      - backend    # Para comunicação com o banco
    depends_on:
      db:
        condition: service_healthy   # Aguarda o healthcheck do DB
    volumes:
      - ./app:/app   # Montagem para desenvolvimento (opcional)
    restart: unless-stopped

volumes:
  postgres_data: