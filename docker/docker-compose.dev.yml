services:
  web:
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: 1
    volumes:
      - ./app:/app  # modo read-write para desenvolvimento
    command: flask run --host=0.0.0.0 --port=5000 --reload
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  db:
    ports:
      - "5432:5432"  # apenas para desenvolvimento
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M