services:
  pgadmin:
    image: dpage/pgadmin4:latest
    profiles:
      - tools
      - dev
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    networks:
      - backend
      - frontend
    depends_on:
      - db
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M

  redis:
    image: redis:7-alpine
    profiles:
      - tools
      - dev
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 128M
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  mailhog:
    image: mailhog/mailhog:latest
    profiles:
      - tools
      - dev
    ports:
      - "${MAILHOG_SMTP:-1025}:1025"
      - "${MAILHOG_UI:-8025}:8025"
    networks:
      - frontend
      - backend

volumes:
  redis_data: